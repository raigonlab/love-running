<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Meta tags for search engines -->
  <meta name="description"
    content="Love Running. Club for running in Dublin, Ireland. Urban running, trail running. Dublin Docklands and Phoenix Park." />
  <meta name="keywords"
    content="love running, run, running club, runners, Ireland, Dublin, sport, exercise" />

  <!-- Title -->
  <title>Love Running</title>

  <!-- Favicon-->
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon-zip/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-zip/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-zip/favicon-16x16.png" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <!-- Header -->
  <header>
    <a href="index.html">
      <h1 id="logo">Love Running</h1>
    </a>

    <input type="checkbox" id="nav-toggle" name="nav-toggle" />
    <label for="nav-toggle" class="nav-toggle-label">
      <i class="fa-solid fa-bars"></i>
    </label>

    <nav>
      <ul id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html" class="active">Gallery</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content -->
  <main>
    <section id="gallery">
      <div id="photos">
        <img src="assets/images/athletes.webp" alt="Two athletes running together">
        <img src="assets/images/girls.webp" alt="Three girls at a charity paint running festival">
        <img src="assets/images/runner3.webp" alt="Solo male runner jogging on the beach">
        <img src="assets/images/man.webp" alt="Man at a charity paint running festival">
        <img src="assets/images/runner1.webp" alt="Solo female runner jogging through Phoenix Park">
        <img src="assets/images/runner2.webp" alt="Runners competing in a marathon">
        <img src="assets/images/runner4.webp" alt="Solo female runner jogging on the beach">
        <img src="assets/images/running_gang.webp" alt="Large group of runners taking part in a marathon on a rainy day">
        <img src="assets/images/mud-run.webp" alt="Two women runners taking a muddy selfie after the Mud Runners championship">
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <ul id="social-networks">

      <li>
        <a href="https://facebook.com/" target="_blank" rel="noopener"
          aria-label="Visit our Facebook page (opens in a new tab)">
          <i class="fa-brands fa-facebook"></i>
        </a>
      </li>

      <li>
        <a href="https://x.com/" target="_blank" rel="noopener"
          aria-label="Visit our X (Twitter) page (opens in a new tab)">
          <i class="fa-brands fa-square-x-twitter"></i>
        </a>
      </li>

      <li>
        <a href="https://youtube.com/" target="_blank" rel="noopener"
          aria-label="Visit our YouTube page (opens in a new tab)">
          <i class="fa-brands fa-youtube"></i>
        </a>
      </li>

      <li>
        <a href="https://instagram.com/" target="_blank" rel="noopener"
          aria-label="Visit our Instagram page (opens in a new tab)">
          <i class="fa-brands fa-square-instagram"></i>
        </a>
      </li>

    </ul>
  </footer>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/0bfdc7ff3a.js" crossorigin="anonymous"></script>
</body>

</html>
