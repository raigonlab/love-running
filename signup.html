<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Meta tags for search engines -->
  <meta name="description"
    content="Love Running. Club for running in Dublin, Irland. Urban running, trail running. Dublin dockland and Phoenix Park" />
  <meta name="keywords" content="love running, run, running club, runners, Irland, Dublin, sport, exercise" />

  <!-- Title -->
  <title>Love Runnig</title>
  <!-- Favicon-->
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon-zip/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-zip/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-zip/favicon-16x16.png" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<!-- Header -->

<body>
  <header>
    <a href="index.html">
      <h1 id="logo">Love Runnig</h1>
    </a>
    <input type="checkbox" id="nav-toggle" name="nav-toggle" />
    <label for="nav-toggle" class="nav-toggle-label"><i class="fa-solid fa-bars"></i></label>


    <nav>
      <ul id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="signup.html" class="active">Sing Up</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content -->
  <main>
    <section id="signup">
      <h2><i class="fa-solid fa-heart-pulse"></i>Let's get you signed up!</h2>

      <form id="signup-form" method="POST" action="https://formdump.codeinstitute.net">
        <label for="first-name">First Name</label>
        <input
        type="text"
        name="first_name"
        for="first_name"
        id="first-name"
        class="text-input" required>
        <br>
        <label for="last-name">Last Name</label>
        <input
        type="text"
        name="last-name"
        id="last-name"
        class="text-input" required>
        <br>
        <label for="email-adress">Email Adress</label>
        <input type="email"
        name="email-adress"
        id="first-name"
        class="text-input" required>
        <br>
        <div class="radio-buttons">
          <label for="road">Road</label>
          <input type="radio"
          name="running-preference"
          id="road"
          value="road"
          required checked>
          <br>

          <label for="trail">Trail</label>
          <input type="radio"
          name="running-preference"
          id="trail"
          value="trail"
          required checked>
          <br>

          <label for="both">Both</label>
          <input type="radio"
          name="running-preference"
          id="both"
          value="both"
          required checked>
        </div>

        <button
        class="join-button"
        type="submit">Let's Run!</button>
      </form>


    </section>
  </main>

  <!-- Footer -->
  <footer>
    <ul id="social-networks">
      <!-- Facebook -->
      <li>
        <a href="https://facebook.com/" target="_blank" rel="noopener"
          aria-label="visit our Facebook page (opens in a new tab)"><i class="fa-brands fa-facebook"></i></a>
      </li>
      <!-- x - twiter -->
      <li>
        <a href="https://x.com/" target="_blank" rel="noopener"
          aria-label="visit our X-Twiter page (opens in a new tab)"><i class="fa-brands fa-square-x-twitter"></i></a>
      </li>
      </li>

      <!-- Youtube -->
      <li>
        <a href="https://Youtube.com/" target="_blank" rel="noopener"
          aria-label="visit our Youtube page (opens in a new tab)"><i class="fa-brands fa-youtube"></i></a>
      </li>

      <!-- Instagram -->
      <li>
        <a href="https://Instagram.com/" target="_blank" rel="noopener"
          aria-label="visit our Instagram page (opens in a new tab)"><i class="fa-brands fa-square-instagram"></i></a>
      </li>

    </ul>
  </footer>
  <!-- Font Awesome kit  -->
  <script src="https://kit.fontawesome.com/0bfdc7ff3a.js" crossorigin="anonymous"></script>
</body>

</html>
